name: Deploy to Phala Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1:
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Step 3:
      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/eliza:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      # Step 4:
      - name: Notify Phala Cloud
        run: |
          # Define docker_compose
          DOCKER_COMPOSE=$(cat <<EOF
            version: '3'
            services:
              eliza:
                image: ghcr.io/${{ github.repository_owner }}/eliza:latest
                container_name: eliza
                command:
                  - /bin/sh
                  - -c
                  - |
                    cd /app                    
                    pnpm start --character=characters/trump.character.json
                ports:
                  - "3000:3000"
                volumes:
                  - /var/run/tappd.sock:/var/run/tappd.sock
                  - tee:/app/db.sqlite
                environment:
                  - TEE_MODE=PRODUCTION
                  - REDPILL_API_KEY=\${REDPILL_API_KEY}
                  - SMALL_REDPILL_MODEL=gpt-4o-mini
                  - MEDIUM_REDPILL_MODEL=gpt-4o-mini
                  - LARGE_REDPILL_MODEL=gpt-4o-mini 
                  - REDPILL_MODEL=gpt-4o-mini
                  - TWITTER_USERNAME=${TWITTER_USERNAME_ENV}
                  - TWITTER_PASSWORD=${TWITTER_PASSWORD_ENV}
                  - TWITTER_EMAIL=${TWITTER_EMAIL_ENV}
                  - TWITTER_POLL_INTERVAL=120
                restart: always
            volumes:
              tee:
          EOF
          )

          # Notify Phala Cloud  
          curl -X POST https://cloud-api.phala.network/api/v1/cvms/from_cvm_configuration \
          -H "Authorization: Bearer $PHALA_CLOUD_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "danny-eliza",
            "compose_manifest": {
              "name": "danny-eliza",
              "features": ["kms", "tproxy-net"],
              "docker_compose_file": "$DOCKER_COMPOSE"
            },
            "vcpu": 2,
            "memory": 4096,
            "disk_size": 40,
            "teepod_id": 2,
            "image": "dstack-dev-0.3.4",
            "advanced_features": {
              "tproxy": true,
              "kms": true,
              "public_sys_info": true,
              "public_logs": true,
              "docker_config": {
                "password": "$DOCKER_REGISTRY_PASSWORD",
                "registry": "ghcr.io",
                "username": "$DOCKER_REGISTRY_USERNAME"
              },
              "listed": false
            }
            "encrypted_env": $ENCRYPTED_ENV,
            "app_env_encrypt_pubkey": $APP_ENV_ENCRYPT_PUBKEY,
            "app_id_salt": $APP_ID_SALT
          }'

env:
  PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
  DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
  DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
  ENCRYPTED_ENV: ${{ secrets.ENCRYPTED_ENV }}
  APP_ENV_ENCRYPT_PUBKEY: ${{ secrets.APP_ENV_ENCRYPT_PUBKEY }}
  APP_ID_SALT: ${{ secrets.APP_ID_SALT }}
