name: Deploy to Phala Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1:
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Step 3:
      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/eliza:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      # Step 4: 
      - name: Notify Phala Cloud
        run: |
          curl -X POST https://cloud-api.phala.network/api/v1/cvms/from_cvm_configuration \
            -H "Authorization: Bearer ${{ secrets.PHALA_CLOUD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "user_id": 123, 
              "name": "eliza-deployment",
              "image": "ghcr.io/${{ github.repository_owner }}/eliza:latest",
              "vcpu": 2,
              "memory": 4096,
              "disk_size": 10,
              "compose_manifest": {
                "docker_compose_file": "",
                "docker_config": {
                  "password": "${{ secrets.DOCKER_REGISTRY_PASSWORD }}",
                  "registry": "ghcr.io",
                  "username": "${{ secrets.DOCKER_REGISTRY_USERNAME }}"
                },
                "features": ["kms", "tproxy-net"],
                "kms_enabled": true,
                "manifest_version": 1,
                "name": "eliza-app",
                "public_logs": false,
                "public_sysinfo": false,
                "runner": "docker-compose",
                "salt": "some-salt",
                "tproxy_enabled": true,
                "version": "1.0.0"
              },
              "ports": [
                {
                  "protocol": "tcp",
                  "host_port": 8080,
                  "vm_port": 80
                }
              ],
              "encrypted_env": "",
              "app_id_salt": "some-app-id-salt",
              "teepod_id": 1,
              "listed": false
            }'

